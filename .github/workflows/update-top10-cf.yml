name: 每日更新 CloudFlare 前10優選 IP

on:
  schedule:
    - cron: '0 0 * * *'           # 每天 UTC 00:00（香港時間 08:00）
  workflow_dispatch:              # 支援手動運行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4

      - name: 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: pip install requests

      - name: 運行腳本
        run: python update_ips.py

      - name: 提交並推送（安全處理）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git fetch origin
          git rebase origin/main || true
          
          git add cf-top10.txt
          
          git diff --staged --quiet || git commit -m "自動更新 CloudFlare 前10優選 IP $(date +'%Y-%m-%d %H:%M HKT')"
          
          git push origin main || git push --force-with-lease origin main
