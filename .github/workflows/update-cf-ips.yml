name: 每日更新 CloudFlare 優選 IP

on:
  schedule:
    - cron: '0 0 * * *'           # 每天 UTC 00:00（香港時間早上 8:00）
  workflow_dispatch:              # 支援手動觸發

permissions:
  contents: write                 # 必須有寫入權限

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v4   # v4 目前仍穩定，若警告可改 v6

      - name: 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: pip install requests

      - name: 運行更新腳本
        run: python update_ips.py

      - name: 提交並推送（安全處理衝突）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 先拉取遠端最新變化，避免 rejected
          git fetch origin
          git rebase origin/main || git rebase --abort && echo "Rebase 失敗，已中止"
          
          git add cf-ips.txt
          
          # 只在有實際變化時 commit
          git diff --staged --quiet || git commit -m "自動更新優選 IP 列表 $(date +'%Y-%m-%d %H:%M HKT')"
          
          # 推送（如果仍衝突，可考慮 --force-with-lease 但謹慎使用）
          git push origin main
